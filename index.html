<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{BUSINESS_NAME}} | Professional Cleaning Services in {{CITY}}, {{STATE}}</title>
    <meta name="description"
        content="{{BUSINESS_NAME}} offers professional residential cleaning services in {{CITY}}, {{STATE}}. Trusted, insured, and locally owned. Get a free quote today!" />

    <!-- Google Fonts: Inter + Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '{{PRIMARY_COLOR}}',
                        secondary: '{{SECONDARY_COLOR}}',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    },
                },
            },
        };
    </script>

    <!-- React + ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX transform -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary: #2563EB;
            --secondary: #F8FAFC;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fff;
            color: #1e293b;
            margin: 0;
            padding: 0;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Poppins', sans-serif;
        }

        /* Hero subtle dot pattern */
        .hero-pattern {
            background-color: #1e3a5f;
            background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.08) 1px, transparent 0);
            background-size: 28px 28px;
        }

        /* Smooth nav active underline */
        .nav-link {
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #2563EB;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Card hover lift */
        .card-hover {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.12);
        }

        /* Star rating */
        .star {
            color: #F59E0B;
        }

        /* Mobile menu transition */
        .mobile-menu {
            transition: max-height 0.35s ease, opacity 0.35s ease;
            overflow: hidden;
        }

        .mobile-menu.closed {
            max-height: 0;
            opacity: 0;
            pointer-events: none;
        }

        .mobile-menu.open {
            max-height: 600px;
            opacity: 1;
        }

        /* Form input focus */
        .form-input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* Badge shimmer */
        .badge-card {
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f2ff 100%);
            border: 1px solid #dbeafe;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /* ─── SVG Icons ─────────────────────────────────── */
        const IconHome = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-8 h-8">
                <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 12l8.954-8.955a1.5 1.5 0 012.092 0L21.75 12M4.5 9.75v10.125A1.125 1.125 0 005.625 21h3.75a1.125 1.125 0 001.125-1.125V15.75a1.125 1.125 0 011.125-1.125h2.25a1.125 1.125 0 011.125 1.125v4.125c0 .621.504 1.125 1.125 1.125h3.75c.621 0 1.125-.504 1.125-1.125V9.75" />
            </svg>
        );
        const IconSpark = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-8 h-8">
                <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
            </svg>
        );
        const IconTruck = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-8 h-8">
                <path strokeLinecap="round" strokeLinejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
            </svg>
        );
        const IconShield = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-10 h-10">
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
            </svg>
        );
        const IconLeaf = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-10 h-10">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
            </svg>
        );
        const IconStar = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-10 h-10">
                <path fillRule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clipRule="evenodd" />
            </svg>
        );
        const IconCheck = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-10 h-10">
                <path fillRule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm13.36-1.814a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clipRule="evenodd" />
            </svg>
        );
        const IconId = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-10 h-10">
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z" />
            </svg>
        );
        const IconPhone = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-5 h-5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
            </svg>
        );
        const IconMail = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-5 h-5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
        );
        const IconMenu = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-6 h-6">
                <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        );
        const IconClose = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-6 h-6">
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        /* ─── Star Rating ────────────────────────────────── */
        const Stars = ({ count = 5 }) => (
            <div className="flex gap-0.5 mb-3">
                {Array.from({ length: count }).map((_, i) => (
                    <svg key={i} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5 star">
                        <path fillRule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clipRule="evenodd" />
                    </svg>
                ))}
            </div>
        );

        /* ─── Navbar ─────────────────────────────────────── */
        const Navbar = () => {
            const [menuOpen, setMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            const navLinks = [
                { label: 'Services', href: '#services' },
                { label: 'Why Us', href: '#why-us' },
                { label: 'Reviews', href: '#reviews' },
                { label: 'Contact', href: '#contact' },
            ];

            const handleNav = (href) => {
                setMenuOpen(false);
                const el = document.querySelector(href);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <nav
                    id="navbar"
                    className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'bg-white shadow-md' : 'bg-white/95 backdrop-blur-sm'
                        }`}
                    style={{ borderBottom: '1px solid #e2e8f0' }}
                >
                    <div className="max-w-6xl mx-auto px-4 sm:px-6">
                        <div className="flex items-center justify-between h-16">
                            {/* Logo / Business Name */}
                            <a
                                href="#hero"
                                className="flex items-center gap-2 font-heading font-bold text-xl"
                                style={{ color: '#2563EB' }}
                                onClick={(e) => { e.preventDefault(); handleNav('#hero'); }}
                            >
                                <div
                                    className="w-9 h-9 rounded-lg flex items-center justify-center text-white text-sm font-bold"
                                    style={{ background: 'linear-gradient(135deg, #2563EB, #1d4ed8)' }}
                                >
                                    ✦
                                </div>
                                <span className="hidden sm:block" style={{ color: '#1e293b' }}>{{ BUSINESS_NAME }}</span>
                            </a>

                            {/* Desktop Nav */}
                            <div className="hidden md:flex items-center gap-8">
                                {navLinks.map((l) => (
                                    <a
                                        key={l.href}
                                        href={l.href}
                                        className="nav-link text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors cursor-pointer"
                                        onClick={(e) => { e.preventDefault(); handleNav(l.href); }}
                                    >
                                        {l.label}
                                    </a>
                                ))}
                                <a
                                    href="#contact"
                                    className="ml-2 px-4 py-2 rounded-lg text-sm font-semibold text-white transition-all duration-200 hover:opacity-90 hover:shadow-md"
                                    style={{ background: 'linear-gradient(135deg, #2563EB, #1d4ed8)' }}
                                    onClick={(e) => { e.preventDefault(); handleNav('#contact'); }}
                                >
                                    Get a Quote
                                </a>
                            </div>

                            {/* Mobile Hamburger */}
                            <button
                                id="mobile-menu-btn"
                                className="md:hidden p-2 rounded-lg text-slate-600 hover:bg-slate-100 transition"
                                aria-label="Toggle menu"
                                onClick={() => setMenuOpen(!menuOpen)}
                            >
                                {menuOpen ? <IconClose /> : <IconMenu />}
                            </button>
                        </div>
                    </div>

                    {/* Mobile Dropdown */}
                    <div className={`mobile-menu md:hidden bg-white border-t border-slate-100 ${menuOpen ? 'open' : 'closed'}`}>
                        <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col gap-1">
                            {navLinks.map((l) => (
                                <a
                                    key={l.href}
                                    href={l.href}
                                    className="block py-2.5 px-3 rounded-lg text-sm font-medium text-slate-700 hover:bg-blue-50 hover:text-blue-600 transition"
                                    onClick={(e) => { e.preventDefault(); handleNav(l.href); }}
                                >
                                    {l.label}
                                </a>
                            ))}
                            <a
                                href="#contact"
                                className="mt-2 block text-center py-3 px-4 rounded-lg text-sm font-semibold text-white"
                                style={{ background: 'linear-gradient(135deg, #2563EB, #1d4ed8)' }}
                                onClick={(e) => { e.preventDefault(); handleNav('#contact'); }}
                            >
                                Get a Free Quote
                            </a>
                        </div>
                    </div>
                </nav>
            );
        };

        /* ─── Hero Section ───────────────────────────────── */
        const HeroSection = () => (
            /* SECTION: HERO START */
            <section
                id="hero"
                className="hero-pattern min-h-screen flex items-center pt-16"
                aria-label="Hero"
            >
                <div className="max-w-6xl mx-auto px-4 sm:px-6 py-20 w-full">
                    <div className="max-w-2xl">
                        {/* Badge */}
                        <div className="inline-flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/20 text-white text-xs font-semibold px-4 py-1.5 rounded-full mb-6">
                            <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse inline-block"></span>
                            Now accepting new clients in {{ CITY }}, {{ STATE }}
                        </div>

                        <h1 className="font-heading font-extrabold text-4xl sm:text-5xl lg:text-6xl text-white leading-tight mb-5">
                            Professional Cleaning Services in {{ CITY }}
                        </h1>

                        <p className="text-lg sm:text-xl text-blue-100 mb-8 leading-relaxed">
                            Trusted, insured, and locally owned — bringing spotless results to homes across {{ CITY }}, {{ STATE }}.
                        </p>

                        {/* Trust row */}
                        <div className="flex flex-wrap gap-4 mb-10 text-blue-100 text-sm">
                            {['✓ Fully Insured', '✓ Background-Checked', '✓ Satisfaction Guaranteed'].map((t) => (
                                <span key={t} className="font-medium">{t}</span>
                            ))}
                        </div>

                        {/* CTAs */}
                        <div className="flex flex-col sm:flex-row gap-4">
                            <a
                                id="hero-quote-btn"
                                href="#contact"
                                className="inline-flex items-center justify-center px-7 py-4 rounded-xl text-base font-semibold text-blue-700 bg-white hover:bg-blue-50 transition-all duration-200 shadow-lg hover:shadow-xl"
                                onClick={(e) => {
                                    e.preventDefault();
                                    document.querySelector('#contact').scrollIntoView({ behavior: 'smooth' });
                                }}
                            >
                                Get a Free Quote
                            </a>
                            <a
                                id="hero-call-btn"
                                href="tel:{{PHONE}}"
                                className="inline-flex items-center justify-center gap-2 px-7 py-4 rounded-xl text-base font-semibold text-white border-2 border-white/40 hover:border-white hover:bg-white/10 transition-all duration-200"
                            >
                                <IconPhone />
                                Call Now: {{ PHONE }}
                            </a>
                        </div>
                    </div>
                </div>

                {/* Decorative wave */}
                <div className="absolute bottom-0 left-0 right-0 overflow-hidden" style={{ lineHeight: 0 }}>
                    <svg viewBox="0 0 1440 60" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style={{ display: 'block', width: '100%', height: '60px' }}>
                        <path d="M0 60L1440 60L1440 20C1080 60 720 0 360 40L0 20L0 60Z" fill="white" />
                    </svg>
                </div>
            </section>
            /* SECTION: HERO END */
        );

        /* ─── Services Section ───────────────────────────── */
        const services = [
            {
                icon: <IconHome />,
                title: 'Residential Cleaning',
                description: 'Regular home cleaning tailored to your schedule. From kitchens to bathrooms, we handle it all with care.',
                id: 'svc-residential',
            },
            {
                icon: <IconSpark />,
                title: 'Deep Cleaning',
                description: 'A thorough top-to-bottom clean for homes that need extra attention — baseboards, appliances, and more.',
                id: 'svc-deep',
            },
            {
                icon: <IconTruck />,
                title: 'Move-In / Move-Out Cleaning',
                description: 'Leave your old home spotless or arrive to a fresh new one. Perfect for landlords and tenants alike.',
                id: 'svc-moveinout',
            },
        ];

        const ServicesSection = () => (
            /* SECTION: SERVICES START */
            <section id="services" className="py-20 bg-white" aria-label="Services">
                <div className="max-w-6xl mx-auto px-4 sm:px-6">
                    <div className="text-center mb-14">
                        <span className="text-sm font-semibold tracking-widest uppercase" style={{ color: '#2563EB' }}>Our Services</span>
                        <h2 className="font-heading font-bold text-3xl sm:text-4xl text-slate-900 mt-2 mb-4">
                            What We Offer
                        </h2>
                        <p className="text-slate-500 max-w-lg mx-auto text-base">
                            Professional cleaning solutions for every need. More services coming soon.
                        </p>
                    </div>

                    {/* Service Cards — flex-wrap so future cards naturally expand */}
                    <div className="flex flex-wrap justify-center gap-6">
                        {services.map((s) => (
                            <div
                                key={s.id}
                                id={s.id}
                                className="card-hover bg-white rounded-2xl p-8 flex-1 min-w-[260px] max-w-[340px] border border-slate-100 shadow-sm"
                                style={{ boxShadow: '0 4px 20px rgba(0,0,0,0.06)' }}
                            >
                                <div
                                    className="w-14 h-14 rounded-xl flex items-center justify-center mb-5 text-white"
                                    style={{ background: 'linear-gradient(135deg, #2563EB, #1d4ed8)' }}
                                >
                                    {s.icon}
                                </div>
                                <h3 className="font-heading font-semibold text-xl text-slate-900 mb-2">{s.title}</h3>
                                <p className="text-slate-500 text-sm leading-relaxed mb-5">{s.description}</p>
                                <a
                                    href="#contact"
                                    className="text-sm font-semibold inline-flex items-center gap-1 transition-colors"
                                    style={{ color: '#2563EB' }}
                                    onClick={(e) => { e.preventDefault(); document.querySelector('#contact').scrollIntoView({ behavior: 'smooth' }); }}
                                >
                                    Learn More →
                                </a>
                            </div>
                        ))}
                        {/* Future card slot hint (invisible in production, easy to find for expansion) */}
                        {/* ADD FUTURE SERVICE CARDS BELOW THIS COMMENT */}
                    </div>
                </div>
            </section>
            /* SECTION: SERVICES END */
        );

        /* ─── Why Choose Us ──────────────────────────────── */
        const badges = [
            { icon: <IconShield />, title: 'Insured & Bonded', desc: 'Fully covered for your peace of mind.', id: 'badge-insured' },
            { icon: <IconLeaf />, title: 'Eco-Friendly Products', desc: 'Safe for kids, pets, and the planet.', id: 'badge-eco' },
            {
                icon: <IconStar />, title: 'Satisfaction Guaranteed', desc: "Not happy? We'll make it right — free.", id: 'badge-guarantee'
            },
            { icon: <IconId />, title: 'Background-Checked Staff', desc: 'Every cleaner is vetted and trusted.', id: 'badge-background' },
        ];

        const WhyUsSection = () => (
            /* SECTION: WHY-US START */
            <section id="why-us" className="py-20" style={{ background: '#F8FAFC' }} aria-label="Why Choose Us">
                <div className="max-w-6xl mx-auto px-4 sm:px-6">
                    <div className="text-center mb-14">
                        <span className="text-sm font-semibold tracking-widest uppercase" style={{ color: '#2563EB' }}>Trust &amp; Quality</span>
                        <h2 className="font-heading font-bold text-3xl sm:text-4xl text-slate-900 mt-2 mb-4">
                            Why {{ CITY }} Homeowners Choose Us
                        </h2>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        {badges.map((b) => (
                            <div
                                key={b.id}
                                id={b.id}
                                className="badge-card rounded-2xl p-6 text-center card-hover"
                            >
                                <div className="flex justify-center mb-4" style={{ color: '#2563EB' }}>
                                    {b.icon}
                                </div>
                                <h3 className="font-heading font-semibold text-slate-900 text-base mb-1">{b.title}</h3>
                                <p className="text-slate-500 text-sm leading-snug">{b.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
            /* SECTION: WHY-US END */
        );

        /* ─── Testimonials ───────────────────────────────── */
        const reviews = [
            {
                id: 'review-1',
                name: 'Sarah M.',
                location: '{{CITY}}, {{STATE}}',
                text: `I've been using {{BUSINESS_NAME}} for three months now and I couldn't be happier. My home has never looked so clean — they even got the baseboards I always forget about!`,
            },
            {
                id: 'review-2',
                name: 'James T.',
                location: '{{CITY}}, {{STATE}}',
                text: `Booked a deep clean before hosting a big family event. The team arrived on time, were super professional, and left my place spotless. Highly recommend to anyone in {{CITY}}!`,
            },
            {
                id: 'review-3',
                name: 'Linda R.',
                location: '{{CITY}}, {{STATE}}',
                text: `Used their move-out cleaning service when I sold my house. The new owners were impressed and I got my full deposit back. Worth every penny!`,
            },
        ];

        const TestimonialsSection = () => (
            /* SECTION: TESTIMONIALS START */
            <section id="reviews" className="py-20 bg-white" aria-label="Reviews">
                <div className="max-w-6xl mx-auto px-4 sm:px-6">
                    <div className="text-center mb-14">
                        <span className="text-sm font-semibold tracking-widest uppercase" style={{ color: '#2563EB' }}>Customer Reviews</span>
                        <h2 className="font-heading font-bold text-3xl sm:text-4xl text-slate-900 mt-2 mb-4">
                            What Our Clients Say
                        </h2>
                        <p className="text-slate-500 max-w-lg mx-auto text-base">
                            Real feedback from real homeowners in {{ CITY }}.
                        </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {reviews.map((r) => (
                            <div
                                key={r.id}
                                id={r.id}
                                className="card-hover bg-white rounded-2xl p-7 border border-slate-100"
                                style={{ boxShadow: '0 4px 20px rgba(0,0,0,0.06)' }}
                            >
                                <Stars count={5} />
                                <p className="text-slate-600 text-sm leading-relaxed mb-5 italic">"{r.text}"</p>
                                <div className="flex items-center gap-3">
                                    <div
                                        className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm"
                                        style={{ background: 'linear-gradient(135deg, #2563EB, #1d4ed8)' }}
                                    >
                                        {r.name[0]}
                                    </div>
                                    <div>
                                        <p className="font-semibold text-slate-900 text-sm">{r.name}</p>
                                        <p className="text-slate-400 text-xs">{r.location}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
            /* SECTION: TESTIMONIALS END */
        );

        /* ─── Contact / Quote Form ────────────────────────── */
        const ContactSection = () => {
            const [form, setForm] = useState({
                name: '', phone: '', email: '',
                service: '', date: '', message: '',
            });
            const [submitted, setSubmitted] = useState(false);

            const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

            const handleSubmit = (e) => {
                e.preventDefault();
                // GHL form swap point — this default submit can be removed when embedding GHL native form
                setSubmitted(true);
            };

            return (
                /* SECTION: CONTACT START */
                <section id="contact" className="py-20" style={{ background: '#F8FAFC' }} aria-label="Contact">
                    <div className="max-w-6xl mx-auto px-4 sm:px-6">
                        <div className="text-center mb-14">
                            <span className="text-sm font-semibold tracking-widest uppercase" style={{ color: '#2563EB' }}>Free Quote</span>
                            <h2 className="font-heading font-bold text-3xl sm:text-4xl text-slate-900 mt-2 mb-4">
                                Request Your Free Estimate
                            </h2>
                            <p className="text-slate-500 max-w-lg mx-auto text-base">
                                Fill out the form below and we'll get back to you within 24 hours.
                            </p>
                        </div>

                        <div className="max-w-2xl mx-auto">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 sm:p-10">

                                {/* GHL FORM EMBED GOES HERE */}
                                <div id="ghl-form-placeholder">
                                    {/* <!-- GHL FORM EMBED GOES HERE --> */}

                                    {submitted ? (
                                        <div className="text-center py-12">
                                            <div className="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
                                                <svg className="w-8 h-8 text-green-600" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor">
                                                    <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                                                </svg>
                                            </div>
                                            <h3 className="font-heading font-bold text-xl text-slate-900 mb-2">Request Received!</h3>
                                            <p className="text-slate-500">We'll reach out to you within 24 hours to confirm your appointment.</p>
                                        </div>
                                    ) : (
                                        <form id="quote-form" onSubmit={handleSubmit} noValidate>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-5">
                                                {/* Full Name */}
                                                <div>
                                                    <label htmlFor="name" className="block text-sm font-medium text-slate-700 mb-1.5">Full Name *</label>
                                                    <input
                                                        id="name" name="name" type="text" required
                                                        placeholder="Jane Smith"
                                                        value={form.name} onChange={handleChange}
                                                        className="form-input w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 transition"
                                                    />
                                                </div>
                                                {/* Phone */}
                                                <div>
                                                    <label htmlFor="phone" className="block text-sm font-medium text-slate-700 mb-1.5">Phone *</label>
                                                    <input
                                                        id="phone" name="phone" type="tel" required
                                                        placeholder="(555) 000-0000"
                                                        value={form.phone} onChange={handleChange}
                                                        className="form-input w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 transition"
                                                    />
                                                </div>
                                                {/* Email */}
                                                <div>
                                                    <label htmlFor="email" className="block text-sm font-medium text-slate-700 mb-1.5">Email *</label>
                                                    <input
                                                        id="email" name="email" type="email" required
                                                        placeholder="jane@email.com"
                                                        value={form.email} onChange={handleChange}
                                                        className="form-input w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 transition"
                                                    />
                                                </div>
                                                {/* Service Type */}
                                                <div>
                                                    <label htmlFor="service" className="block text-sm font-medium text-slate-700 mb-1.5">Service Type *</label>
                                                    <select
                                                        id="service" name="service" required
                                                        value={form.service} onChange={handleChange}
                                                        className="form-input w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 transition"
                                                    >
                                                        <option value="">Select a service…</option>
                                                        <option value="residential">Residential Cleaning</option>
                                                        <option value="deep">Deep Cleaning</option>
                                                        <option value="move">Move-In / Move-Out Cleaning</option>
                                                        <option value="other">Other</option>
                                                    </select>
                                                </div>
                                                {/* Preferred Date */}
                                                <div className="sm:col-span-2">
                                                    <label htmlFor="date" className="block text-sm font-medium text-slate-700 mb-1.5">Preferred Date</label>
                                                    <input
                                                        id="date" name="date" type="date"
                                                        value={form.date} onChange={handleChange}
                                                        className="form-input w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 transition"
                                                    />
                                                </div>
                                                {/* Message */}
                                                <div className="sm:col-span-2">
                                                    <label htmlFor="message" className="block text-sm font-medium text-slate-700 mb-1.5">Message</label>
                                                    <textarea
                                                        id="message" name="message" rows={4}
                                                        placeholder="Tell us about your home and any special requests…"
                                                        value={form.message} onChange={handleChange}
                                                        className="form-input w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 transition resize-none"
                                                    />
                                                </div>
                                            </div>

                                            <button
                                                id="submit-quote-btn"
                                                type="submit"
                                                className="w-full py-4 rounded-xl text-base font-semibold text-white transition-all duration-200 hover:opacity-90 hover:shadow-lg"
                                                style={{ background: 'linear-gradient(135deg, #2563EB, #1d4ed8)' }}
                                            >
                                                Request Free Quote
                                            </button>
                                        </form>
                                    )}
                                </div>

                                {/* Quick contact options */}
                                <div className="mt-8 pt-8 border-t border-slate-100 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <a
                                        id="contact-call-btn"
                                        href="tel:{{PHONE}}"
                                        className="flex items-center justify-center gap-3 py-3 px-5 rounded-xl border-2 font-semibold text-sm transition-all duration-200 hover:shadow-md"
                                        style={{ borderColor: '#2563EB', color: '#2563EB' }}
                                    >
                                        <IconPhone />
                                        Call {{ PHONE }}
                                    </a>
                                    <a
                                        id="contact-email-btn"
                                        href="mailto:{{EMAIL}}"
                                        className="flex items-center justify-center gap-3 py-3 px-5 rounded-xl border-2 font-semibold text-sm transition-all duration-200 hover:shadow-md"
                                        style={{ borderColor: '#64748b', color: '#64748b' }}
                                    >
                                        <IconMail />
                                        {{ EMAIL }}
                                    </a>
                                </div>

                            </div>
                        </div>
                    </div>
                </section>
                /* SECTION: CONTACT END */
            );
        };

        /* ─── Footer ─────────────────────────────────────── */
        const Footer = () => {
            const year = new Date().getFullYear();
            const navLinks = [
                { label: 'Services', href: '#services' },
                { label: 'Why Us', href: '#why-us' },
                { label: 'Reviews', href: '#reviews' },
                { label: 'Contact', href: '#contact' },
            ];
            const handleNav = (href) => {
                const el = document.querySelector(href);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            };
            return (
                /* SECTION: FOOTER START */
                <footer className="bg-slate-900 text-slate-300 py-14" aria-label="Footer">
                    <div className="max-w-6xl mx-auto px-4 sm:px-6">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-10 mb-10">
                            {/* Brand */}
                            <div>
                                <h3 className="font-heading font-bold text-white text-lg mb-2">{{ BUSINESS_NAME }}</h3>
                                <p className="text-slate-400 text-sm leading-relaxed">
                                    Professional residential cleaning services in {{ CITY }}, {{ STATE }}. Trusted, insured, and locally owned.
                                </p>
                            </div>
                            {/* Navigation */}
                            <div>
                                <h4 className="font-semibold text-white text-sm mb-4 tracking-wide uppercase">Navigation</h4>
                                <ul className="space-y-2">
                                    {navLinks.map((l) => (
                                        <li key={l.href}>
                                            <a
                                                href={l.href}
                                                className="text-slate-400 text-sm hover:text-white transition-colors cursor-pointer"
                                                onClick={(e) => { e.preventDefault(); handleNav(l.href); }}
                                            >
                                                {l.label}
                                            </a>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                            {/* Contact */}
                            <div>
                                <h4 className="font-semibold text-white text-sm mb-4 tracking-wide uppercase">Contact</h4>
                                <ul className="space-y-3">
                                    <li>
                                        <a href="tel:{{PHONE}}" className="flex items-center gap-2 text-slate-400 text-sm hover:text-white transition-colors">
                                            <IconPhone />{{ PHONE }}
                                        </a>
                                    </li>
                                    <li>
                                        <a href="mailto:{{EMAIL}}" className="flex items-center gap-2 text-slate-400 text-sm hover:text-white transition-colors">
                                            <IconMail />{{ EMAIL }}
                                        </a>
                                    </li>
                                    <li className="text-slate-500 text-sm">{{ CITY }}, {{ STATE }}</li>
                                </ul>
                            </div>
                        </div>
                        <div className="border-t border-slate-800 pt-6 text-center">
                            {/* Replace {year} below with a static year if needed, or leave dynamic */}
                            <p className="text-slate-500 text-sm">
                                © {year} {{ BUSINESS_NAME }}. All rights reserved.
                            </p>
                        </div>
                    </div>
                </footer>
                /* SECTION: FOOTER END */
            );
        };

        /* ─── App Root ───────────────────────────────────── */
        const App = () => (
            <React.Fragment>
                <Navbar />
                <main>
                    <HeroSection />
                    <ServicesSection />
                    <WhyUsSection />
                    <TestimonialsSection />
                    <ContactSection />
                </main>
                <Footer />
            </React.Fragment>
        );

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>

</html>
