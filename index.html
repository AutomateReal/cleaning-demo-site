<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{BUSINESS_NAME}} | Professional Cleaning Services in {{CITY}}, {{STATE}}</title>
    <meta name="description"
        content="{{BUSINESS_NAME}} offers professional residential cleaning services in {{CITY}}, {{STATE}}. Trusted, insured, and locally owned. Get a free quote today!" />

    <!-- Google Fonts: Inter + Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    },
                },
            },
        };
    </script>

    <!-- React + ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX transform -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: #1e293b;
            margin: 0;
            padding: 0;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Poppins', sans-serif;
        }

        .hero-bg {
            background-color: #1e3a5f;
            background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.08) 1px, transparent 0);
            background-size: 28px 28px;
        }

        .nav-link {
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #2563EB;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.12);
        }

        .star {
            color: #F59E0B;
        }

        .mobile-menu {
            transition: max-height 0.35s ease, opacity 0.35s ease;
            overflow: hidden;
        }

        .mobile-menu.closed {
            max-height: 0;
            opacity: 0;
            pointer-events: none;
        }

        .mobile-menu.open {
            max-height: 600px;
            opacity: 1;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .badge-card {
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f2ff 100%);
            border: 1px solid #dbeafe;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563EB, #1d4ed8);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ── Placeholder tokens (find & replace these) ──────────────────────────
        const T = {
            name: '{{BUSINESS_NAME}}',
            city: '{{CITY}}',
            state: '{{STATE}}',
            phone: '{{PHONE}}',
            email: '{{EMAIL}}',
        };
        const YEAR = new Date().getFullYear();
        // ──────────────────────────────────────────────────────────────────────

        // ── SVG Icons ──────────────────────────────────────────────────────────
        const IPhone = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-5 h-5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
            </svg>
        );
        const IMail = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-5 h-5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
        );
        const IMenu = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-6 h-6">
                <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        );
        const IClose = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-6 h-6">
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        );
        const IHome = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-8 h-8">
                <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 12l8.954-8.955a1.5 1.5 0 012.092 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125h3.75c.621 0 1.125-.504 1.125-1.125V15.75c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v4.125c0 .621.504 1.125 1.125 1.125h3.75c.621 0 1.125-.504 1.125-1.125V9.75" />
            </svg>
        );
        const ISpark = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-8 h-8">
                <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
            </svg>
        );
        const ITruck = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-8 h-8">
                <path strokeLinecap="round" strokeLinejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
            </svg>
        );
        const IShield = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-10 h-10">
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
            </svg>
        );
        const ILeaf = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-10 h-10">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5a17.92 17.92 0 01-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
            </svg>
        );
        const IStar = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-10 h-10">
                <path fillRule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clipRule="evenodd" />
            </svg>
        );
        const IBadge = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.8} stroke="currentColor" className="w-10 h-10">
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z" />
            </svg>
        );

        const StarRow = () => (
            <div className="flex gap-0.5 mb-3">
                {[1, 2, 3, 4, 5].map(i => (
                    <svg key={i} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5 star">
                        <path fillRule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clipRule="evenodd" />
                    </svg>
                ))}
            </div>
        );

        // ── Smooth scroll helper ───────────────────────────────────────────────
        const scrollTo = (id) => {
            const el = document.querySelector(id);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
        };

        // ── Navbar ─────────────────────────────────────────────────────────────
        const Navbar = () => {
            const [open, setOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const fn = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', fn);
                return () => window.removeEventListener('scroll', fn);
            }, []);

            const links = [
                { label: 'Services', href: '#services' },
                { label: 'Why Us', href: '#why-us' },
                { label: 'Reviews', href: '#reviews' },
                { label: 'Contact', href: '#contact' },
            ];

            const go = (href) => { setOpen(false); scrollTo(href); };

            return (
                <nav id="navbar" className={"fixed top-0 left-0 right-0 z-50 transition-all duration-300 " + (scrolled ? "bg-white shadow-md" : "bg-white/95 backdrop-blur-sm")} style={{ borderBottom: '1px solid #e2e8f0' }}>
                    <div className="max-w-6xl mx-auto px-4 sm:px-6">
                        <div className="flex items-center justify-between h-16">
                            <a href="#hero" className="flex items-center gap-2" onClick={e => { e.preventDefault(); go('#hero'); }}>
                                <div className="w-9 h-9 rounded-lg flex items-center justify-center text-white text-sm font-bold btn-primary">✦</div>
                                <span className="hidden sm:block font-heading font-bold text-lg text-slate-800">{T.name}</span>
                            </a>
                            <div className="hidden md:flex items-center gap-8">
                                {links.map(l => (
                                    <a key={l.href} href={l.href} className="nav-link text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors" onClick={e => { e.preventDefault(); go(l.href); }}>{l.label}</a>
                                ))}
                                <a href="#contact" className="ml-2 px-4 py-2 rounded-lg text-sm font-semibold text-white btn-primary hover:opacity-90 transition" onClick={e => { e.preventDefault(); go('#contact'); }}>Get a Quote</a>
                            </div>
                            <button id="mobile-menu-btn" className="md:hidden p-2 rounded-lg text-slate-600 hover:bg-slate-100 transition" aria-label="Toggle menu" onClick={() => setOpen(!open)}>
                                {open ? <IClose /> : <IMenu />}
                            </button>
                        </div>
                    </div>
                    <div className={"mobile-menu md:hidden bg-white border-t border-slate-100 " + (open ? 'open' : 'closed')}>
                        <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col gap-1">
                            {links.map(l => (
                                <a key={l.href} href={l.href} className="block py-2.5 px-3 rounded-lg text-sm font-medium text-slate-700 hover:bg-blue-50 hover:text-blue-600 transition" onClick={e => { e.preventDefault(); go(l.href); }}>{l.label}</a>
                            ))}
                            <a href="#contact" className="mt-2 block text-center py-3 px-4 rounded-lg text-sm font-semibold text-white btn-primary" onClick={e => { e.preventDefault(); go('#contact'); }}>Get a Free Quote</a>
                        </div>
                    </div>
                </nav>
            );
        };

        // ── Hero ───────────────────────────────────────────────────────────────
        // SECTION: HERO START
        const Hero = () => (
            <section id="hero" className="hero-bg min-h-screen flex items-center pt-16 relative" aria-label="Hero">
                <div className="max-w-6xl mx-auto px-4 sm:px-6 py-20 w-full">
                    <div className="max-w-2xl">
                        <div className="inline-flex items-center gap-2 bg-white/10 border border-white/20 text-white text-xs font-semibold px-4 py-1.5 rounded-full mb-6">
                            <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse inline-block"></span>
                            Now accepting new clients in {T.city}, {T.state}
                        </div>
                        <h1 className="font-heading font-extrabold text-4xl sm:text-5xl lg:text-6xl text-white leading-tight mb-5">
                            Professional Cleaning Services in {T.city}
                        </h1>
                        <p className="text-lg sm:text-xl text-blue-100 mb-8 leading-relaxed">
                            Trusted, insured, and locally owned — bringing spotless results to homes across {T.city}, {T.state}.
                        </p>
                        <div className="flex flex-wrap gap-4 mb-10 text-blue-100 text-sm">
                            {['Fully Insured', 'Background-Checked', 'Satisfaction Guaranteed'].map(t => (
                                <span key={t} className="font-medium">✓ {t}</span>
                            ))}
                        </div>
                        <div className="flex flex-col sm:flex-row gap-4">
                            <a id="hero-quote-btn" href="#contact" className="inline-flex items-center justify-center px-7 py-4 rounded-xl text-base font-semibold text-blue-700 bg-white hover:bg-blue-50 transition shadow-lg hover:shadow-xl" onClick={e => { e.preventDefault(); scrollTo('#contact'); }}>
                                Get a Free Quote
                            </a>
                            <a id="hero-call-btn" href={"tel:" + T.phone} className="inline-flex items-center justify-center gap-2 px-7 py-4 rounded-xl text-base font-semibold text-white border-2 border-white/40 hover:border-white hover:bg-white/10 transition">
                                <IPhone /> Call Now: {T.phone}
                            </a>
                        </div>
                    </div>
                </div>
                <div className="absolute bottom-0 left-0 right-0 overflow-hidden" style={{ lineHeight: 0 }}>
                    <svg viewBox="0 0 1440 60" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style={{ display: 'block', width: '100%', height: '60px' }}>
                        <path d="M0 60L1440 60L1440 20C1080 60 720 0 360 40L0 20L0 60Z" fill="white" />
                    </svg>
                </div>
            </section>
        );
        // SECTION: HERO END

        // ── Services ───────────────────────────────────────────────────────────
        // SECTION: SERVICES START
        const serviceCards = [
            { id: 'svc-residential', icon: <IHome />, title: 'Residential Cleaning', desc: 'Regular home cleaning tailored to your schedule. From kitchens to bathrooms, we handle it all with care.' },
            { id: 'svc-deep', icon: <ISpark />, title: 'Deep Cleaning', desc: 'A thorough top-to-bottom clean for homes that need extra attention — baseboards, appliances, and more.' },
            { id: 'svc-moveinout', icon: <ITruck />, title: 'Move-In / Move-Out Cleaning', desc: 'Leave your old home spotless or arrive to a fresh new one. Perfect for landlords and tenants alike.' },
        ];
        const Services = () => (
            <section id="services" className="py-20 bg-white" aria-label="Services">
                <div className="max-w-6xl mx-auto px-4 sm:px-6">
                    <div className="text-center mb-14">
                        <span className="text-sm font-semibold tracking-widest uppercase" style={{ color: '#2563EB' }}>Our Services</span>
                        <h2 className="font-heading font-bold text-3xl sm:text-4xl text-slate-900 mt-2 mb-4">What We Offer</h2>
                        <p className="text-slate-500 max-w-lg mx-auto text-base">Professional cleaning solutions for every need. More services coming soon.</p>
                    </div>
                    <div className="flex flex-wrap justify-center gap-6">
                        {serviceCards.map(s => (
                            <div key={s.id} id={s.id} className="card bg-white rounded-2xl p-8 flex-1 min-w-[260px] max-w-[340px] border border-slate-100" style={{ boxShadow: '0 4px 20px rgba(0,0,0,0.06)' }}>
                                <div className="w-14 h-14 rounded-xl flex items-center justify-center mb-5 text-white btn-primary">{s.icon}</div>
                                <h3 className="font-heading font-semibold text-xl text-slate-900 mb-2">{s.title}</h3>
                                <p className="text-slate-500 text-sm leading-relaxed mb-5">{s.desc}</p>
                                <a href="#contact" className="text-sm font-semibold" style={{ color: '#2563EB' }} onClick={e => { e.preventDefault(); scrollTo('#contact'); }}>Learn More →</a>
                            </div>
                        ))}
                        {/* ADD FUTURE SERVICE CARDS BELOW THIS COMMENT */}
                    </div>
                </div>
            </section>
        );
        // SECTION: SERVICES END

        // ── Why Us ─────────────────────────────────────────────────────────────
        // SECTION: WHY-US START
        const badgeCards = [
            { id: 'badge-insured', icon: <IShield />, title: 'Insured & Bonded', desc: 'Fully covered for your peace of mind.' },
            { id: 'badge-eco', icon: <ILeaf />, title: 'Eco-Friendly Products', desc: 'Safe for kids, pets, and the planet.' },
            { id: 'badge-guarantee', icon: <IStar />, title: 'Satisfaction Guaranteed', desc: "Not happy? We'll make it right — free." },
            { id: 'badge-background', icon: <IBadge />, title: 'Background-Checked Staff', desc: 'Every cleaner is vetted and trusted.' },
        ];
        const WhyUs = () => (
            <section id="why-us" className="py-20" style={{ background: '#F8FAFC' }} aria-label="Why Choose Us">
                <div className="max-w-6xl mx-auto px-4 sm:px-6">
                    <div className="text-center mb-14">
                        <span className="text-sm font-semibold tracking-widest uppercase" style={{ color: '#2563EB' }}>Trust &amp; Quality</span>
                        <h2 className="font-heading font-bold text-3xl sm:text-4xl text-slate-900 mt-2 mb-4">Why {T.city} Homeowners Choose Us</h2>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        {badgeCards.map(b => (
                            <div key={b.id} id={b.id} className="badge-card rounded-2xl p-6 text-center card">
                                <div className="flex justify-center mb-4" style={{ color: '#2563EB' }}>{b.icon}</div>
                                <h3 className="font-heading font-semibold text-slate-900 text-base mb-1">{b.title}</h3>
                                <p className="text-slate-500 text-sm leading-snug">{b.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );
        // SECTION: WHY-US END

        // ── Testimonials ───────────────────────────────────────────────────────
        // SECTION: TESTIMONIALS START
        const reviewData = [
            { id: 'review-1', name: 'Sarah M.', loc: T.city + ', ' + T.state, text: "I've been using " + T.name + " for three months now and I couldn't be happier. My home has never looked so clean — they even got the baseboards I always forget about!" },
            { id: 'review-2', name: 'James T.', loc: T.city + ', ' + T.state, text: "Booked a deep clean before hosting a big family event. The team arrived on time, were super professional, and left my place spotless. Highly recommend to anyone in " + T.city + "!" },
            { id: 'review-3', name: 'Linda R.', loc: T.city + ', ' + T.state, text: "Used their move-out cleaning service when I sold my house. The new owners were impressed and I got my full deposit back. Worth every penny!" },
        ];
        const Reviews = () => (
            <section id="reviews" className="py-20 bg-white" aria-label="Reviews">
                <div className="max-w-6xl mx-auto px-4 sm:px-6">
                    <div className="text-center mb-14">
                        <span className="text-sm font-semibold tracking-widest uppercase" style={{ color: '#2563EB' }}>Customer Reviews</span>
                        <h2 className="font-heading font-bold text-3xl sm:text-4xl text-slate-900 mt-2 mb-4">What Our Clients Say</h2>
                        <p className="text-slate-500 max-w-lg mx-auto text-base">Real feedback from real homeowners in {T.city}.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {reviewData.map(r => (
                            <div key={r.id} id={r.id} className="card bg-white rounded-2xl p-7 border border-slate-100" style={{ boxShadow: '0 4px 20px rgba(0,0,0,0.06)' }}>
                                <StarRow />
                                <p className="text-slate-600 text-sm leading-relaxed mb-5 italic">"{r.text}"</p>
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm btn-primary">{r.name[0]}</div>
                                    <div>
                                        <p className="font-semibold text-slate-900 text-sm">{r.name}</p>
                                        <p className="text-slate-400 text-xs">{r.loc}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );
        // SECTION: TESTIMONIALS END

        // ── Contact ────────────────────────────────────────────────────────────
        // SECTION: CONTACT START
        const Contact = () => {
            const [form, setForm] = useState({ name: '', phone: '', email: '', service: '', date: '', message: '' });
            const [done, setDone] = useState(false);
            const set = e => setForm({ ...form, [e.target.name]: e.target.value });
            const submit = e => { e.preventDefault(); setDone(true); };
            const ic = "form-input w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 transition";

            return (
                <section id="contact" className="py-20" style={{ background: '#F8FAFC' }} aria-label="Contact">
                    <div className="max-w-6xl mx-auto px-4 sm:px-6">
                        <div className="text-center mb-14">
                            <span className="text-sm font-semibold tracking-widest uppercase" style={{ color: '#2563EB' }}>Free Quote</span>
                            <h2 className="font-heading font-bold text-3xl sm:text-4xl text-slate-900 mt-2 mb-4">Request Your Free Estimate</h2>
                            <p className="text-slate-500 max-w-lg mx-auto text-base">Fill out the form below and we'll get back to you within 24 hours.</p>
                        </div>
                        <div className="max-w-2xl mx-auto">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 sm:p-10">

                                {/* GHL FORM EMBED GOES HERE */}
                                <div id="ghl-form-placeholder">
                                    {/* <!-- GHL FORM EMBED GOES HERE --> */}

                                    {done ? (
                                        <div className="text-center py-12">
                                            <div className="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
                                                <svg className="w-8 h-8 text-green-600" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor">
                                                    <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                                                </svg>
                                            </div>
                                            <h3 className="font-heading font-bold text-xl text-slate-900 mb-2">Request Received!</h3>
                                            <p className="text-slate-500">We'll reach out within 24 hours to confirm your appointment.</p>
                                        </div>
                                    ) : (
                                        <form id="quote-form" onSubmit={submit} noValidate>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-5">
                                                <div>
                                                    <label htmlFor="name" className="block text-sm font-medium text-slate-700 mb-1.5">Full Name *</label>
                                                    <input id="name" name="name" type="text" required placeholder="Jane Smith" value={form.name} onChange={set} className={ic} />
                                                </div>
                                                <div>
                                                    <label htmlFor="phone" className="block text-sm font-medium text-slate-700 mb-1.5">Phone *</label>
                                                    <input id="phone" name="phone" type="tel" required placeholder="(555) 000-0000" value={form.phone} onChange={set} className={ic} />
                                                </div>
                                                <div>
                                                    <label htmlFor="email" className="block text-sm font-medium text-slate-700 mb-1.5">Email *</label>
                                                    <input id="email" name="email" type="email" required placeholder="jane@email.com" value={form.email} onChange={set} className={ic} />
                                                </div>
                                                <div>
                                                    <label htmlFor="service" className="block text-sm font-medium text-slate-700 mb-1.5">Service Type *</label>
                                                    <select id="service" name="service" required value={form.service} onChange={set} className={ic}>
                                                        <option value="">Select a service…</option>
                                                        <option value="residential">Residential Cleaning</option>
                                                        <option value="deep">Deep Cleaning</option>
                                                        <option value="move">Move-In / Move-Out Cleaning</option>
                                                        <option value="other">Other</option>
                                                    </select>
                                                </div>
                                                <div className="sm:col-span-2">
                                                    <label htmlFor="date" className="block text-sm font-medium text-slate-700 mb-1.5">Preferred Date</label>
                                                    <input id="date" name="date" type="date" value={form.date} onChange={set} className={ic} />
                                                </div>
                                                <div className="sm:col-span-2">
                                                    <label htmlFor="message" className="block text-sm font-medium text-slate-700 mb-1.5">Message</label>
                                                    <textarea id="message" name="message" rows={4} placeholder="Tell us about your home and any special requests…" value={form.message} onChange={set} className={ic + " resize-none"} />
                                                </div>
                                            </div>
                                            <button id="submit-quote-btn" type="submit" className="w-full py-4 rounded-xl text-base font-semibold text-white btn-primary hover:opacity-90 hover:shadow-lg transition">
                                                Request Free Quote
                                            </button>
                                        </form>
                                    )}
                                </div>

                                <div className="mt-8 pt-8 border-t border-slate-100 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <a id="contact-call-btn" href={"tel:" + T.phone} className="flex items-center justify-center gap-3 py-3 px-5 rounded-xl border-2 font-semibold text-sm hover:shadow-md transition" style={{ borderColor: '#2563EB', color: '#2563EB' }}>
                                        <IPhone /> Call {T.phone}
                                    </a>
                                    <a id="contact-email-btn" href={"mailto:" + T.email} className="flex items-center justify-center gap-3 py-3 px-5 rounded-xl border-2 font-semibold text-sm hover:shadow-md transition" style={{ borderColor: '#64748b', color: '#64748b' }}>
                                        <IMail /> {T.email}
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };
        // SECTION: CONTACT END

        // ── Footer ─────────────────────────────────────────────────────────────
        // SECTION: FOOTER START
        const Footer = () => {
            const links = [
                { label: 'Services', href: '#services' },
                { label: 'Why Us', href: '#why-us' },
                { label: 'Reviews', href: '#reviews' },
                { label: 'Contact', href: '#contact' },
            ];
            return (
                <footer className="bg-slate-900 text-slate-300 py-14" aria-label="Footer">
                    <div className="max-w-6xl mx-auto px-4 sm:px-6">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-10 mb-10">
                            <div>
                                <h3 className="font-heading font-bold text-white text-lg mb-2">{T.name}</h3>
                                <p className="text-slate-400 text-sm leading-relaxed">Professional residential cleaning services in {T.city}, {T.state}. Trusted, insured, and locally owned.</p>
                            </div>
                            <div>
                                <h4 className="font-semibold text-white text-sm mb-4 tracking-wide uppercase">Navigation</h4>
                                <ul className="space-y-2">
                                    {links.map(l => (
                                        <li key={l.href}>
                                            <a href={l.href} className="text-slate-400 text-sm hover:text-white transition-colors" onClick={e => { e.preventDefault(); scrollTo(l.href); }}>{l.label}</a>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                            <div>
                                <h4 className="font-semibold text-white text-sm mb-4 tracking-wide uppercase">Contact</h4>
                                <ul className="space-y-3">
                                    <li><a href={"tel:" + T.phone} className="flex items-center gap-2 text-slate-400 text-sm hover:text-white transition"><IPhone />{T.phone}</a></li>
                                    <li><a href={"mailto:" + T.email} className="flex items-center gap-2 text-slate-400 text-sm hover:text-white transition"><IMail />{T.email}</a></li>
                                    <li className="text-slate-500 text-sm">{T.city}, {T.state}</li>
                                </ul>
                            </div>
                        </div>
                        <div className="border-t border-slate-800 pt-6 text-center">
                            <p className="text-slate-500 text-sm">&copy; {YEAR} {T.name}. All rights reserved.</p>
                        </div>
                    </div>
                </footer>
            );
        };
        // SECTION: FOOTER END

        // ── App ────────────────────────────────────────────────────────────────
        const App = () => (
            <React.Fragment>
                <Navbar />
                <main>
                    <Hero />
                    <Services />
                    <WhyUs />
                    <Reviews />
                    <Contact />
                </main>
                <Footer />
            </React.Fragment>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
